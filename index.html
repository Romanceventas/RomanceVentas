    <script>
        window.ROMANCE_PWA = { deferredPrompt: null, canInstall: false, isInstalled: false };
        (function () {
            const stateEvent = "romance-install-state";
            const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) ||
                (navigator.userAgent.includes("Mac") && "ontouchend" in document);

            function emitState() {
                window.dispatchEvent(new CustomEvent(stateEvent, {
                    detail: {
                        canInstall: !!window.ROMANCE_PWA.deferredPrompt,
                        isInstalled: !!window.ROMANCE_PWA.isInstalled,
                        isIOS
                    }
                }));
            }

            function updateInstalledState() {
                const standaloneMedia = window.matchMedia ? window.matchMedia('(display-mode: standalone)').matches : false;
                window.ROMANCE_PWA.isInstalled = standaloneMedia || window.navigator.standalone === true;
                emitState();
            }

            window.addEventListener('beforeinstallprompt', function (event) {
                event.preventDefault();
                window.ROMANCE_PWA.deferredPrompt = event;
                window.ROMANCE_PWA.canInstall = true;
                emitState();
            });

            window.addEventListener('appinstalled', function () {
                window.ROMANCE_PWA.deferredPrompt = null;
                window.ROMANCE_PWA.canInstall = false;
                window.ROMANCE_PWA.isInstalled = true;
                emitState();
            });

            if ('serviceWorker' in navigator && (location.protocol === 'https:' || location.hostname === 'localhost' || location.hostname === '127.0.0.1')) {
                window.addEventListener('load', function () {
                    navigator.serviceWorker.register('./sw.js').catch(function (error) {
                        console.warn('No se pudo registrar el service worker', error);
                    });
                });
            }

            if (window.matchMedia) {
                const mediaQuery = window.matchMedia('(display-mode: standalone)');
                if (mediaQuery.addEventListener) {
                    mediaQuery.addEventListener('change', updateInstalledState);
                } else if (mediaQuery.addListener) {
                    mediaQuery.addListener(updateInstalledState);
                }
            }

            updateInstalledState();
            window.ROMANCE_PWA.isIOS = isIOS;
            emitState();
        })();
    </script>

        function safeParse(raw, fallback) {
            try {
                return raw ? JSON.parse(raw) : fallback;
            } catch (error) {
                return fallback;
            }
        }

        function normalizeHex(hex) {
            const value = (hex || "").toString().trim();
            if (!value) return "#111827";
            const cleaned = value.replace(/^##+/, "#");
            const withHash = cleaned.startsWith("#") ? cleaned : `#${cleaned}`;
            return /^#([0-9a-fA-F]{3,4}|[0-9a-fA-F]{6}|[0-9a-fA-F]{8})$/.test(withHash) ? withHash : "#111827";
        }

        function normalizeColor(color, index = 0) {
            if (!color || typeof color !== "object") {
                return { name: `Color ${index + 1}`, hex: "#111827" };
            }
            return {
                name: (color.name || `Color ${index + 1}`).toString().trim(),
                hex: normalizeHex(color.hex)
            };
        }

function normalizeImageList(product) {
    const rawImages = Array.isArray(product?.images)
        ? product.images
        : typeof product?.images === "string"
            ? product.images.split(/\r?\n|,/)
            : [];
    const merged = [
        (product?.image || "").toString().trim(),
        ...rawImages.map(item => (item || "").toString().trim())
    ].filter(Boolean);

    return [...new Set(merged)];
}

function normalizeProduct(product, index = 0) {
    const idNumber = Number(product?.id);
    const normalizedSizes = Array.isArray(product?.sizes)
        ? product.sizes.map(size => (size || "").toString().trim()).filter(Boolean)
        : [];
    const normalizedColors = Array.isArray(product?.colors)
        ? product.colors.map((color, colorIndex) => normalizeColor(color, colorIndex)).filter(Boolean)
        : [];
    const normalizedImages = normalizeImageList(product);

    return {
        id: Number.isFinite(idNumber) && idNumber > 0 ? idNumber : Date.now() + index,
        name: (product?.name || "Producto sin nombre").toString().trim(),
        category: (product?.category || "General").toString().trim(),
        price: Number(product?.price) > 0 ? Number(product.price) : 0,
        image: normalizedImages[0] || "",
        images: normalizedImages,
        colors: normalizedColors.length ? normalizedColors : [{ name: "Único", hex: "#111827" }],
        sizes: normalizedSizes.length ? normalizedSizes : ["Única"],
        description: (product?.description || "").toString().trim(),
        active: product?.active !== false
    };
}

        function normalizeProducts(products) {
            if (!Array.isArray(products)) return [];
            return products.map((product, index) => normalizeProduct(product, index)).sort((a, b) => a.id - b.id);
        }

        function loadShopConfig() {
            const saved = safeParse(localStorage.getItem(STORAGE_KEYS.shopConfig), null);
            return {
                ...DEFAULT_SHOP_CONFIG,
                ...(saved || {}),
                bankDetails: {
                    ...DEFAULT_SHOP_CONFIG.bankDetails,
                    ...((saved && saved.bankDetails) || {})
                }
            };
        }

        function loadProducts() {
            const saved = safeParse(localStorage.getItem(STORAGE_KEYS.products), null);
            return normalizeProducts(saved || DEFAULT_PRODUCTS);
        }

        function saveShopConfig(config) {
            localStorage.setItem(STORAGE_KEYS.shopConfig, JSON.stringify(config));
        }

        function saveProducts(products) {
            localStorage.setItem(STORAGE_KEYS.products, JSON.stringify(normalizeProducts(products)));
        }

        function loadAdminPin() {
            return localStorage.getItem(STORAGE_KEYS.adminPin) || DEFAULT_ADMIN_PIN;
        }

        function saveAdminPin(pin) {
            localStorage.setItem(STORAGE_KEYS.adminPin, (pin || DEFAULT_ADMIN_PIN).trim());
        }

        function dispatchDataUpdated() {
            window.dispatchEvent(new CustomEvent("catalog-data-updated"));
        }

function getProductImages(product) {
    const images = normalizeImageList(product);
    return images.length ? images : [PLACEHOLDER_IMAGE];
}

function getProductImage(product, index = 0) {
    const images = getProductImages(product);
    return images[index] || images[0] || PLACEHOLDER_IMAGE;
}

function parseSizes(text) {
    return (text || "")
        .split(",")
        .map(item => item.trim())
        .filter(Boolean);
}

function parseImageList(text) {
    return [...new Set(
        (text || "")
            .split(/\r?\n/)
            .map(item => item.trim())
            .filter(Boolean)
    )];
}

        function parseColors(text) {
            const lines = (text || "").split("\n").map(line => line.trim()).filter(Boolean);
            return lines.map((line, index) => {
                const [name, hex] = line.split("|");
                return normalizeColor({ name: (name || `Color ${index + 1}`).trim(), hex: (hex || "#111827").trim() }, index);
            });
        }

function productToForm(product) {
    const safeProduct = normalizeProduct(product || {});
    return {
        id: safeProduct.id,
        name: safeProduct.name,
        category: safeProduct.category,
        price: safeProduct.price,
        image: safeProduct.image,
        imagesText: safeProduct.images.join("\n"),
        description: safeProduct.description,
        sizesText: safeProduct.sizes.join(", "),
        colorsText: safeProduct.colors.map(color => `${color.name}|${color.hex}`).join("\n"),
        active: safeProduct.active
    };
}

function createEmptyProduct(products) {
    const maxId = products.reduce((max, product) => Math.max(max, Number(product.id) || 0), 0);
    return productToForm({
        id: maxId + 1,
        name: "",
        category: "",
        price: "",
        image: "",
        images: [],
        description: "",
        sizes: ["Única"],
        colors: [{ name: "Único", hex: "#111827" }],
        active: true
    });
}

function formToProduct(form) {
    const images = parseImageList(form.imagesText || form.image || "");
    return normalizeProduct({
        id: form.id,
        name: form.name,
        category: form.category,
        price: form.price,
        image: images[0] || form.image,
        images,
        description: form.description,
        sizes: parseSizes(form.sizesText),
        colors: parseColors(form.colorsText),
        active: form.active
    });
}

            }

            function handleSaveConfig() {
                const cleanConfig = {
                    name: (configDraft.name || "Romance").trim(),
                    whatsappNumber: (configDraft.whatsappNumber || "").replace(/\D/g, ""),
                    bankDetails: {
                        bank: (configDraft.bankDetails?.bank || "").trim(),
                        holder: (configDraft.bankDetails?.holder || "").trim(),
                        rut: (configDraft.bankDetails?.rut || "").trim(),
                        accountType: (configDraft.bankDetails?.accountType || "").trim(),
                        accountNumber: (configDraft.bankDetails?.accountNumber || "").trim(),
                        email: (configDraft.bankDetails?.email || "").trim()
                    }
                };
                saveShopConfig(cleanConfig);
                setShopConfig(cleanConfig);
                dispatchDataUpdated();
                alert("Datos de la tienda guardados.");
            }

            function handleSaveProduct() {
                const cleanProduct = formToProduct(productForm);
                if (!cleanProduct.name) {
                    alert("El producto debe tener nombre.");
                    return;
                }
                const updated = normalizeProducts([
                    ...products.filter(product => product.id !== cleanProduct.id),
                    cleanProduct
                ]);
                saveProducts(updated);
                setProducts(updated);
                setProductForm(productToForm(cleanProduct));
                dispatchDataUpdated();
                alert("Producto guardado.");
            }

            function handleDeleteProduct(id) {
                const product = products.find(item => item.id === id);
                if (!product) return;
                const confirmed = window.confirm(`¿Eliminar "${product.name}"?`);
                if (!confirmed) return;
                const updated = products.filter(item => item.id !== id);
                saveProducts(updated);
                setProducts(updated);
                setProductForm(createEmptyProduct(updated));
                dispatchDataUpdated();
            }

            function handleDuplicateProduct() {
                const source = formToProduct(productForm);
                const maxId = products.reduce((max, product) => Math.max(max, Number(product.id) || 0), 0);
                const duplicate = normalizeProduct({
                    ...source,
                    id: maxId + 1,
                    name: `${source.name} copia`
                });
                const updated = normalizeProducts([...products, duplicate]);
                saveProducts(updated);
                setProducts(updated);
                setProductForm(productToForm(duplicate));
                dispatchDataUpdated();
                alert("Producto duplicado.");
            }

            function handleChangePin() {
                if (!newPin.trim()) {
                    alert("El PIN no puede quedar vacío.");
                    return;
                }
                saveAdminPin(newPin.trim());
                alert("PIN actualizado.");
            }

            function downloadFile(filename, content, type = "application/json;charset=utf-8") {
                const blob = new Blob([content], { type });
                const url = URL.createObjectURL(blob);
                const link = document.createElement("a");
                link.href = url;
                link.download = filename;
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
                URL.revokeObjectURL(url);
            }

            function handleDownloadBackup() {
                const payload = JSON.stringify({ shopConfig, products }, null, 2);
                downloadFile("romance-respaldo.json", payload);
            }

            function handleLoadCurrentJson() {
                setJsonDraft(JSON.stringify({ shopConfig, products }, null, 2));
            }

            function handleImportJson() {
                try {
                    const parsed = JSON.parse(jsonDraft);
                    const nextShopConfig = parsed.shopConfig ? {
                        ...DEFAULT_SHOP_CONFIG,
                        ...parsed.shopConfig,
                        bankDetails: {
                            ...DEFAULT_SHOP_CONFIG.bankDetails,
                            ...(parsed.shopConfig.bankDetails || {})
                        }
                    } : shopConfig;
                    const nextProducts = parsed.products ? normalizeProducts(parsed.products) : products;

                    saveShopConfig(nextShopConfig);
                    saveProducts(nextProducts);
                    setShopConfig(nextShopConfig);
                    setProducts(nextProducts);
                    setConfigDraft(nextShopConfig);
                    setProductForm(createEmptyProduct(nextProducts));
                    dispatchDataUpdated();
                    alert("Datos importados correctamente.");
                } catch (error) {
                    alert("El JSON no es válido.");
                }
            }

            function handleResetDefaults() {
                const confirmed = window.confirm("Esto restaurará los datos originales del HTML actual. ¿Continuar?");
                if (!confirmed) return;
                localStorage.removeItem(STORAGE_KEYS.shopConfig);
                localStorage.removeItem(STORAGE_KEYS.products);
                setShopConfig(loadShopConfig());
                setProducts(loadProducts());
                setConfigDraft(loadShopConfig());
                setProductForm(createEmptyProduct(loadProducts()));
                setJsonDraft(JSON.stringify({ shopConfig: DEFAULT_SHOP_CONFIG, products: normalizeProducts(DEFAULT_PRODUCTS) }, null, 2));
                dispatchDataUpdated();
                alert("Se restauraron los valores originales.");
            }

            function handleDownloadUpdatedHtml() {
                const shopString = JSON.stringify(shopConfig, null, 2);
                const productsString = JSON.stringify(products, null, 2);
                let html = document.documentElement.outerHTML;

                html = html.replace(
                    /\/\*__SHOP_CONFIG_START__\*\/[\s\S]*?\/\*__SHOP_CONFIG_END__\*\//,
                    `/*__SHOP_CONFIG_START__*/\nconst DEFAULT_SHOP_CONFIG = ${shopString};\n/*__SHOP_CONFIG_END__*/`
                );

                html = html.replace(
                    /\/\*__PRODUCTS_START__\*\/[\s\S]*?\/\*__PRODUCTS_END__\*\//,
                    `/*__PRODUCTS_START__*/\nconst DEFAULT_PRODUCTS = ${productsString};\n/*__PRODUCTS_END__*/`
                );

            }

                                                    <i data-lucide="trash-2" size="16"></i>
                                                </button>
                                            </div>
                                        ))}
                                    </div>
                                    <div className="pt-8 border-t space-y-4">
                                        <div className="flex justify-between font-black text-2xl">
                                            <span className="text-gray-300 text-xs uppercase self-center">Total</span>
                                            <span className="text-pink-600">${total.toLocaleString("es-CL")}</span>
                                        </div>
                                        <button
                                            onClick={() => { setIsCartOpen(false); setView("checkout"); }}
                                            disabled={cart.length === 0}
                                            className="w-full bg-pink-600 text-white py-5 rounded-2xl font-black text-lg disabled:bg-gray-200 shadow-xl shadow-pink-100 active-scale"
                                        >
                                            IR AL PAGO
                                        </button>
                                    </div>
                                </div>
                            </div>
                        )}
                    </div>


                    <button
                        onClick={() => setShowAdmin(true)}
                        className="fixed bottom-4 left-4 z-40 w-12 h-12 rounded-full bg-gray-900 text-white shadow-2xl flex items-center justify-center"
                        title="Panel administrativo"
                    >
                        <i data-lucide="shield"></i>
                    </button>

                    {showAdmin && (
                        <div className="fixed inset-0 z-[70] bg-black/70 backdrop-blur-sm overflow-y-auto">
                            <div className="min-h-screen flex items-center justify-center p-4">
                                <div className="w-full max-w-5xl bg-white rounded-[2rem] shadow-2xl overflow-hidden">
                                    <div className="px-6 py-5 border-b border-gray-100 flex items-center justify-between gap-4">
                                        <div>
                                            <h2 className="text-2xl font-black text-gray-900">Panel administrativo</h2>
                                            <p className="text-sm text-gray-500">Edita productos, datos y genera un HTML actualizado.</p>
                                        </div>
                                        <button onClick={() => setShowAdmin(false)} className="w-10 h-10 rounded-full bg-gray-100 text-gray-500 flex items-center justify-center">
                                            <i data-lucide="x"></i>
                                        </button>
                                    </div>

                                    {!adminLogged ? (
                                        <div className="p-6 md:p-10 max-w-md mx-auto space-y-4">
                                            <div className="bg-gray-50 border border-gray-100 rounded-3xl p-6">
                                                <p className="text-sm text-gray-500 mb-3">Ingresa el PIN para administrar la tienda.</p>
                                                <input
                                                    type="password"
                                                    value={adminPinInput}
                                                    onChange={event => setAdminPinInput(event.target.value)}
                                                    onKeyDown={event => { if (event.key === "Enter") handleAdminLogin(); }}
                                                    placeholder="PIN administrador"
                                                    className="w-full rounded-2xl border border-gray-200 px-4 py-3 outline-none focus:ring-2 focus:ring-pink-200"
                                                />
                                                <button
                                                    onClick={handleAdminLogin}
                                                    className="w-full mt-4 bg-pink-600 text-white py-3 rounded-2xl font-bold"
                                                >
                                                    Entrar
                                                </button>
                                                <p className="text-xs text-amber-600 mt-4">
                                                    Este PIN protege el acceso visual, pero no reemplaza un backend seguro.
                                                </p>
                                            </div>
                                        </div>
                                    ) : (
                                        <div className="p-4 md:p-6 space-y-6">
                                            <div className="flex flex-wrap gap-2">
                                                <button onClick={() => setAdminTab("config")} className={`px-4 py-2 rounded-2xl font-bold ${adminTab === "config" ? "bg-pink-600 text-white" : "bg-gray-100 text-gray-600"}`}>Tienda</button>
                                                <button onClick={() => setAdminTab("products")} className={`px-4 py-2 rounded-2xl font-bold ${adminTab === "products" ? "bg-pink-600 text-white" : "bg-gray-100 text-gray-600"}`}>Productos</button>
                                                <button onClick={() => setAdminTab("backup")} className={`px-4 py-2 rounded-2xl font-bold ${adminTab === "backup" ? "bg-pink-600 text-white" : "bg-gray-100 text-gray-600"}`}>Respaldo</button>
                                                <button onClick={() => { setAdminLogged(false); setAdminTab("config"); }} className="ml-auto px-4 py-2 rounded-2xl font-bold bg-gray-100 text-gray-600">
                                                    Cerrar sesión
                                                </button>
                                            </div>

                                            {adminTab === "config" && (
                                                <div className="grid md:grid-cols-2 gap-6">
                                                    <div className="bg-gray-50 border border-gray-100 rounded-[2rem] p-5 space-y-4">
                                                        <h3 className="text-lg font-black">Datos de la tienda</h3>
                                                        <input className="w-full rounded-2xl border border-gray-200 px-4 py-3 outline-none focus:ring-2 focus:ring-pink-200" placeholder="Nombre de la tienda" value={configDraft.name} onChange={event => setConfigDraft({ ...configDraft, name: event.target.value })} />
                                                        <input className="w-full rounded-2xl border border-gray-200 px-4 py-3 outline-none focus:ring-2 focus:ring-pink-200" placeholder="WhatsApp sin +" value={configDraft.whatsappNumber} onChange={event => setConfigDraft({ ...configDraft, whatsappNumber: event.target.value })} />
                                                        <input className="w-full rounded-2xl border border-gray-200 px-4 py-3 outline-none focus:ring-2 focus:ring-pink-200" placeholder="Banco" value={configDraft.bankDetails.bank} onChange={event => setConfigDraft({ ...configDraft, bankDetails: { ...configDraft.bankDetails, bank: event.target.value } })} />
                                                        <input className="w-full rounded-2xl border border-gray-200 px-4 py-3 outline-none focus:ring-2 focus:ring-pink-200" placeholder="Titular" value={configDraft.bankDetails.holder} onChange={event => setConfigDraft({ ...configDraft, bankDetails: { ...configDraft.bankDetails, holder: event.target.value } })} />
                                                        <input className="w-full rounded-2xl border border-gray-200 px-4 py-3 outline-none focus:ring-2 focus:ring-pink-200" placeholder="RUT" value={configDraft.bankDetails.rut} onChange={event => setConfigDraft({ ...configDraft, bankDetails: { ...configDraft.bankDetails, rut: event.target.value } })} />
                                                        <input className="w-full rounded-2xl border border-gray-200 px-4 py-3 outline-none focus:ring-2 focus:ring-pink-200" placeholder="Tipo de cuenta" value={configDraft.bankDetails.accountType} onChange={event => setConfigDraft({ ...configDraft, bankDetails: { ...configDraft.bankDetails, accountType: event.target.value } })} />
                                                        <input className="w-full rounded-2xl border border-gray-200 px-4 py-3 outline-none focus:ring-2 focus:ring-pink-200" placeholder="Número de cuenta" value={configDraft.bankDetails.accountNumber} onChange={event => setConfigDraft({ ...configDraft, bankDetails: { ...configDraft.bankDetails, accountNumber: event.target.value } })} />
                                                        <input className="w-full rounded-2xl border border-gray-200 px-4 py-3 outline-none focus:ring-2 focus:ring-pink-200" placeholder="Correo" value={configDraft.bankDetails.email} onChange={event => setConfigDraft({ ...configDraft, bankDetails: { ...configDraft.bankDetails, email: event.target.value } })} />
                                                        <button onClick={handleSaveConfig} className="w-full bg-pink-600 text-white py-3 rounded-2xl font-bold">Guardar datos</button>
                                                    </div>

                                                    <div className="bg-gray-50 border border-gray-100 rounded-[2rem] p-5 space-y-4">
                                                        <h3 className="text-lg font-black">Seguridad básica</h3>
                                                        <input type="password" className="w-full rounded-2xl border border-gray-200 px-4 py-3 outline-none focus:ring-2 focus:ring-pink-200" placeholder="Nuevo PIN" value={newPin} onChange={event => setNewPin(event.target.value)} />
                                                        <button onClick={handleChangePin} className="w-full bg-gray-900 text-white py-3 rounded-2xl font-bold">Actualizar PIN</button>

                                                        <div className="border-t pt-4">
                                                            <h4 className="font-black mb-2">Vista rápida</h4>
                                                            <div className="space-y-2 text-sm text-gray-600">
                                                                <p><span className="font-bold text-gray-900">Tienda:</span> {shopConfig.name}</p>
                                                                <p><span className="font-bold text-gray-900">WhatsApp:</span> {shopConfig.whatsappNumber}</p>
                                                                <p><span className="font-bold text-gray-900">Productos activos:</span> {products.filter(product => product.active !== false).length}</p>
                                                            </div>
                                                        </div>

                                                        <div className="border-t pt-4 text-xs text-gray-500 space-y-2">
                                                            <p>Los cambios se guardan en este navegador.</p>
                                                            <p>Para publicarlos para todos, usa la opción <strong>Descargar HTML actualizado</strong> y reemplaza el archivo en tu hosting.</p>
                                                            <p className="mt-2">Mantén junto al <strong>index.html</strong> los archivos <strong>manifest.json</strong>, <strong>sw.js</strong>, la carpeta <strong>icons</strong> y el archivo <strong>.nojekyll</strong> para que la instalación tipo app siga funcionando.</p>
                                                        </div>
                                                    </div>
                                                </div>
                                            )}

                                            {adminTab === "products" && (
                                                <div className="grid lg:grid-cols-[320px,1fr] gap-6">
                                                    <div className="bg-gray-50 border border-gray-100 rounded-[2rem] p-4 space-y-4">
                                                        <div className="flex gap-2">
                                                            <input
                                                                className="flex-1 rounded-2xl border border-gray-200 px-4 py-3 outline-none focus:ring-2 focus:ring-pink-200"
                                                                placeholder="Buscar producto"
                                                                value={adminSearch}
                                                                onChange={event => setAdminSearch(event.target.value)}
                                                            />
                                                            <button
                                                                onClick={() => setProductForm(createEmptyProduct(products))}
                                                                className="px-4 rounded-2xl bg-pink-600 text-white font-bold"
                                                            >
                                                                Nuevo
                                                            </button>
                                                        </div>

                                                        <div className="max-h-[55vh] overflow-y-auto space-y-2 pr-1">
                                                            {adminFilteredProducts.map(product => (
                                                                <button
                                                                    key={product.id}
                                                                    onClick={() => openAdminEditorFor(product)}
                                                                    className={`w-full text-left rounded-2xl border px-3 py-3 transition ${Number(productForm.id) === Number(product.id) ? "border-pink-500 bg-pink-50" : "border-gray-200 bg-white"}`}
                                                                >
                                                                    <div className="flex items-center gap-3">
                                                                        <img
                                                                            src={getProductImage(product)}
                                                                            alt={product.name}
                                                                            className="w-12 h-12 rounded-xl object-cover bg-gray-100"
                                                                            onError={(event) => {
                                                                                event.currentTarget.onerror = null;
                                                                                event.currentTarget.src = PLACEHOLDER_IMAGE;
                                                                            }}
                                                                        />
                                                                        <div className="min-w-0">
                                                                            <p className="font-bold text-sm text-gray-900 truncate">{product.name}</p>
                                                                            <p className="text-xs text-gray-500 truncate">#{product.id} · {product.category || "Sin categoría"}</p>
                                                                            <p className="text-xs font-bold text-pink-600">${product.price.toLocaleString("es-CL")}</p>
                                                                        </div>
                                                                    </div>
                                                                </button>
                                                            ))}
                                                        </div>
                                                    </div>

                                                    <div className="bg-gray-50 border border-gray-100 rounded-[2rem] p-5 space-y-4">
                                                        <h3 className="text-lg font-black">Editor de producto</h3>
                                                        <div className="grid md:grid-cols-2 gap-4">
                                                            <input className="rounded-2xl border border-gray-200 px-4 py-3 outline-none focus:ring-2 focus:ring-pink-200" placeholder="ID" value={productForm.id} onChange={event => setProductForm({ ...productForm, id: event.target.value })} />
                                                            <input className="rounded-2xl border border-gray-200 px-4 py-3 outline-none focus:ring-2 focus:ring-pink-200" placeholder="Categoría" value={productForm.category} onChange={event => setProductForm({ ...productForm, category: event.target.value })} />
                                                        </div>
                                                        <input className="w-full rounded-2xl border border-gray-200 px-4 py-3 outline-none focus:ring-2 focus:ring-pink-200" placeholder="Nombre del producto" value={productForm.name} onChange={event => setProductForm({ ...productForm, name: event.target.value })} />
                                                        <div className="grid md:grid-cols-2 gap-4">
                                                            <input className="rounded-2xl border border-gray-200 px-4 py-3 outline-none focus:ring-2 focus:ring-pink-200" placeholder="Precio" value={productForm.price} onChange={event => setProductForm({ ...productForm, price: event.target.value })} />
                                                            <label className="flex items-center gap-3 rounded-2xl border border-gray-200 px-4 py-3 bg-white">
                                                                <input type="checkbox" checked={productForm.active} onChange={event => setProductForm({ ...productForm, active: event.target.checked })} />
                                                                <span className="font-bold text-sm text-gray-700">Producto visible</span>
                                                            </label>
                                                        </div>
                                                        <textarea className="w-full rounded-2xl border border-gray-200 px-4 py-3 h-28 outline-none focus:ring-2 focus:ring-pink-200 resize-none" placeholder={`URLs de imágenes, una por línea
Ejemplo:
https://.../foto1.jpg
https://.../foto2.jpg`} value={productForm.imagesText} onChange={event => setProductForm({ ...productForm, imagesText: event.target.value, image: parseImageList(event.target.value)[0] || "" })} />
                                                        <textarea className="w-full rounded-2xl border border-gray-200 px-4 py-3 h-24 outline-none focus:ring-2 focus:ring-pink-200 resize-none" placeholder="Descripción" value={productForm.description} onChange={event => setProductForm({ ...productForm, description: event.target.value })} />
                                                        <textarea className="w-full rounded-2xl border border-gray-200 px-4 py-3 h-20 outline-none focus:ring-2 focus:ring-pink-200 resize-none" placeholder="Tallas separadas por coma. Ej: S, M, L, XL" value={productForm.sizesText} onChange={event => setProductForm({ ...productForm, sizesText: event.target.value })} />
                                                        <textarea className="w-full rounded-2xl border border-gray-200 px-4 py-3 h-28 outline-none focus:ring-2 focus:ring-pink-200 resize-none" placeholder={`Colores en formato Nombre|#HEX\nEjemplo:\nNegro|#000000\nRojo|#ff0000`} value={productForm.colorsText} onChange={event => setProductForm({ ...productForm, colorsText: event.target.value })} />

                                                        <div className="bg-white rounded-3xl border border-gray-200 p-4">
                                                            <p className="text-xs font-bold uppercase text-gray-400 mb-3">Vista previa</p>
                                                            <div className="flex gap-4">
                                                                <img
                                                                    src={(parseImageList(productForm.imagesText)[0] || productForm.image || PLACEHOLDER_IMAGE)}
                                                                    alt="Vista previa"
                                                                    className="w-24 h-32 rounded-2xl object-cover bg-gray-100"
                                                                    onError={(event) => {
                                                                        event.currentTarget.onerror = null;
                                                                        event.currentTarget.src = PLACEHOLDER_IMAGE;
                                                                    }}
                                                                />
                                                                <div className="space-y-2 min-w-0">
                                                                    <p className="font-black text-gray-900 break-words">{productForm.name || "Nombre del producto"}</p>
                                                                    <p className="text-sm text-gray-500">{productForm.category || "Categoría"}</p>
                                                                    <p className="text-lg font-black text-pink-600">${Number(productForm.price || 0).toLocaleString("es-CL")}</p>
                                                                    <p className="text-xs text-gray-400">{parseImageList(productForm.imagesText).length || 0} imagen(es)</p>
                                                                </div>
                                                            </div>
                                                            {parseImageList(productForm.imagesText).length > 1 && (
                                                                <div className="mt-4 flex gap-2 overflow-x-auto no-scrollbar">
                                                                    {parseImageList(productForm.imagesText).map((imageUrl, imageIndex) => (
                                                                        <img
                                                                            key={`preview-${imageIndex}`}
                                                                            src={imageUrl}
                                                                            alt={`Preview ${imageIndex + 1}`}
                                                                            className="w-14 h-16 rounded-xl object-cover bg-gray-100 border border-gray-100 shrink-0"
                                                                            onError={(event) => {
                                                                                event.currentTarget.onerror = null;
                                                                                event.currentTarget.src = PLACEHOLDER_IMAGE;
                                                                            }}
                                                                        />
                                                                    ))}
                                                                </div>
                                                            )}
                                                        </div>

                                                        <div className="grid sm:grid-cols-3 gap-3">
                                                            <button onClick={handleSaveProduct} className="bg-pink-600 text-white py-3 rounded-2xl font-bold">Guardar</button>
                                                            <button onClick={handleDuplicateProduct} className="bg-gray-900 text-white py-3 rounded-2xl font-bold">Duplicar</button>
                                                            <button onClick={() => handleDeleteProduct(Number(productForm.id))} className="bg-red-500 text-white py-3 rounded-2xl font-bold">Eliminar</button>
                                                        </div>
                                                    </div>
                                                </div>
                                            )}

                                            {adminTab === "backup" && (
                                                <div className="grid md:grid-cols-2 gap-6">
                                                    <div className="bg-gray-50 border border-gray-100 rounded-[2rem] p-5 space-y-4">
                                                        <h3 className="text-lg font-black">Respaldo JSON</h3>
                                                        <textarea
                                                            className="w-full h-80 rounded-2xl border border-gray-200 px-4 py-3 font-mono text-xs outline-none focus:ring-2 focus:ring-pink-200 resize-none"
                                                            value={jsonDraft}
                                                            onChange={event => setJsonDraft(event.target.value)}
                                                        />
                                                        <div className="grid sm:grid-cols-2 gap-3">
                                                            <button onClick={handleLoadCurrentJson} className="bg-gray-900 text-white py-3 rounded-2xl font-bold">Cargar datos actuales</button>
                                                            <button onClick={handleImportJson} className="bg-pink-600 text-white py-3 rounded-2xl font-bold">Importar JSON</button>
                                                        </div>
                                                    </div>

                                                    <div className="bg-gray-50 border border-gray-100 rounded-[2rem] p-5 space-y-4">
                                                        <h3 className="text-lg font-black">Publicación y recuperación</h3>
                                                        <button onClick={handleDownloadBackup} className="w-full bg-gray-900 text-white py-3 rounded-2xl font-bold">Descargar respaldo JSON</button>
                                                        <button onClick={handleDownloadUpdatedHtml} className="w-full bg-pink-600 text-white py-3 rounded-2xl font-bold">Descargar HTML actualizado</button>
                                                        <button onClick={handleResetDefaults} className="w-full bg-red-500 text-white py-3 rounded-2xl font-bold">Restaurar valores originales</button>

                                                        <div className="border-t pt-4 text-sm text-gray-600 space-y-2">
                                                            <p><strong>Respaldo JSON:</strong> sirve para guardar o mover tus datos.</p>
                                                            <p><strong>HTML actualizado:</strong> sirve para subirlo nuevamente a tu hosting y que todos vean los cambios.</p>
                                                            <p><strong>Restaurar:</strong> vuelve al contenido base de este archivo.</p>
                                                        </div>
                                                    </div>
                                                </div>
                                            )}
                                        </div>
                                    )}
                                </div>
                            </div>
                        </div>
                    )}
                </>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById("root"));
        root.render(<App />);
    </script>
</body>
</html>
